name: Pipeline - OCR

on:
  schedule:
    - cron: '45 * * * *'
  workflow_dispatch:

concurrency:
  group: pipeline-ocr
  cancel-in-progress: false

jobs:
  ocr-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
      PIPELINE_SECRET: ${{ secrets.PIPELINE_SECRET }}
      OCR_WORKER_MAX_CLAIMS: "5"
      OCR_WORKER_RENEW_INTERVAL_SECONDS: "60"
      SCRAPE_MAX_PDF_BYTES: "15000000"
      AI_SOURCE_RESOLUTION_TIMEOUT_SECONDS: "60"
      KREUZBERG_PADDLE_LANGUAGE: "latin"
      KREUZBERG_PADDLE_MODEL_TIER: "mobile"
      KREUZBERG_USE_GPU: "false"
      KREUZBERG_FORCE_OCR_DEFAULT: "false"
      KREUZBERG_EXTRACTION_TIMEOUT_SECONDS: "300"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ocr-worker.txt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/paddleocr
            ~/.paddleocr
            ~/.paddlehub
            ~/.cache/kreuzberg
          key: ocr-models-${{ runner.os }}-${{ hashFiles('requirements-ocr-worker.txt') }}

      - name: Install OCR worker dependencies
        run: pip install -r requirements-ocr-worker.txt

      - name: Show OCR cache directories
        run: |
          echo "HOME=$HOME"
          ls -la ~/.cache || true
          ls -la ~/.cache/paddleocr || true
          ls -la ~/.paddleocr || true
          ls -la ~/.paddlehub || true
          ls -la ~/.cache/kreuzberg || true

      - name: Run OCR worker
        run: python scripts/ocr_worker/run_ocr_worker.py --limit 5
