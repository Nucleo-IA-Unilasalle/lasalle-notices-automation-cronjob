name: PNCP discovery

on:
  schedule:
    - cron: "05 * * * *"
  workflow_dispatch:

concurrency:
  group: pipeline-trigger
  cancel-in-progress: false

jobs:
  discover-pncp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout scheduler repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install requests

      - name: Restore PNCP dedup cache
        uses: actions/cache@v4
        with:
          path: .cache/pncp_submitted_urls.json
          key: pncp-dedup-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pncp-dedup-${{ runner.os }}-

      - name: Discover PNCP candidates
        run: python scripts/discover_pncp_candidates.py
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          PIPELINE_SECRET: ${{ secrets.PIPELINE_SECRET }}
