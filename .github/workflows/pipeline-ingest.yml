name: PNCP ingestion

on:
  schedule:
    - cron: "25 * * * *"
  workflow_dispatch:

concurrency:
  group: pipeline-trigger
  cancel-in-progress: false

jobs:
  ingest-pncp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger PNCP ingestion
        shell: bash
        run: |
          set +e
          status="$(
            curl -sS -o response.json -w "%{http_code}" -X POST \
              "${RENDER_APP_URL}/api/pipeline/ingest?source=pncp&candidate_limit=100&download_limit=5" \
              -H "Authorization: Bearer ${PIPELINE_SECRET}"
          )"
          cat response.json || true
          echo "HTTP status: ${status}"
          if [[ "${status}" == "200" || "${status}" == "202" || "${status}" == "409" ]]; then
            exit 0
          fi
          exit 1
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          PIPELINE_SECRET: ${{ secrets.PIPELINE_SECRET }}
